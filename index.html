<!DOCTYPE html>
<html>

<head>
    <title>ScholarScope</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="logo">ScholarScope</div>
</header>


<main>

<section class="hero">

<h1>Find scholarships that match <span>your future.</span></h1>

<p>
ScholarScope helps students discover scholarship opportunities
based on their interests, strengths, and goals.
</p>

<button id="startBtn">Find My Matches</button>

</section>


<section id="formSection" class="box hidden">

<h2>Create your student profile</h2>

<label>What is your field of interest?</label>

<select id="interest">
<option value="cs">Computer Science</option>
<option value="business">Business</option>
<option value="medicine">Medicine</option>
<option value="engineering">Engineering</option>
<option value="arts">Arts</option>
</select>


<label>Your strongest area:</label>

<select id="strength">
<option value="research">Research</option>
<option value="leadership">Leadership</option>
<option value="coding">Coding</option>
<option value="community">Community Service</option>
<option value="creative">Creativity</option>
</select>


<label>Your goal:</label>

<select id="goal">
<option value="merit">Academic Achievement</option>
<option value="impact">Social Impact</option>
<option value="innovation">Innovation</option>
<option value="financial">Financial Support</option>
</select>


<button id="matchBtn">
Generate Matches
</button>

</section>


<section id="results" class="box hidden">

<h2>Your Scholarship Matches</h2>

<div id="output"></div>

</section>


</main>


<script src="script.js"></script>

</body>

</html>
